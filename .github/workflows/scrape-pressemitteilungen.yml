name: Scrape Pressemitteilungen Steglitz-Zehlendorf

on:
  schedule:
    - cron: '0 7 * * *'   # runs every day at 07:00 UTC (09:00 Berlin time)
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scripts/scrape_pressemitteilungen.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pressemitteilungen/data.json
          git diff --cached --quiet || git commit -m "chore: update pressemitteilungen $(date +'%Y-%m-%d')"
          git push
